name: Release

on:
  # This allows you to run the workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      next-version:
        description: 'Next Version (e.g., v1.0.2)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # Important: Fetch all history if you're pushing tags/commits back
          fetch-depth: 0

      - name: Update Changelog
        uses: stefanzweifel/changelog-updater-action@v1
        with:
          latest-version: ${{ github.event.inputs.next-version }}

      - name: Commit and Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG for ${{ github.event.inputs.next-version }}"
          git tag ${{ github.event.inputs.next-version }}
          git push origin main --tags
